name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # .pnpmfile.cjs runs here — checks package publish dates and rebuilds native modules
        run: pnpm install

      - name: Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true  # warn but don't fail the build on low-severity findings

      - name: Build distributables
        run: pnpm run build
        env:
          # Prevent electron-builder from trying to code-sign (no cert in CI)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discord-audio-splitter-windows
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
